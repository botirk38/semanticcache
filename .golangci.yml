version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    goimports:
      local-prefixes: github.com/botirk38/semanticcache
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
      - path: _bench_test\.go
        linters:
          - unparam
    max-issues-per-linter: 50
    max-same-issues: 10
